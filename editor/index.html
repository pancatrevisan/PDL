<!DOCTYPE html>
<html>
    <head>
        <script src="https://kit.fontawesome.com/9baefea985.js" crossorigin="anonymous"></script>
        <link rel="stylesheet"  href="editor.css"> 
        <link rel="stylesheet" href="../ui/css/editor.css">
        <link rel="stylesheet" href="../ui/css/base.css">

        <script src="editor.js"></script>

        <script src="../utils/Loader.js"></script>

        <script>
            new Loader("../");
            var editor; 
            function body_loaded(){
                
            console.log("new editor");
            editor = new Editor();
            };
            
        </script>
    </head>
    <body onload="body_loaded()">

        <div id="screens">
            
            <i onclick="editor.uiRetractScreenMenu()" id="button-retract-screens" class="fa-solid fa-angle-up"></i>
            <i onclick="editor.uiExpandScreenMenu()" id="button-expand-screens" class="fa-solid fa-angle-down"></i>

            <div id="screens_panel">
                
                <button class="button-screen" id="add-screen" onclick="editor.addNewScreenToApp()">
                    <i class="fa-solid fa-plus "></i>
                </button>
            </div>
        </div>
        <div id="post-screens">

        
            <div id="elements"> 
                <div id="elements_panel">
                    <div class="elements_title">Elements</div>
                    <div > <button  onclick="editor.addElementToCurrentScreen(this.getAttribute('data-element-type'))" data-element-type="button" class="elements_item">Add  Button </button> </div>
                    <div > <button  onclick="editor.addElementToCurrentScreen(this.getAttribute('data-element-type'))" data-element-type="image"  class="elements_item">Add  Image </button> </div>

                </div>
            </div>
            
            <div id="editor">
                <div id="editor_content">
                    Select a Screen...
                </div>
            </div>
        </div>
    </body>
</html>
